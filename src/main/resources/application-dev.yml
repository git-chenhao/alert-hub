# 开发环境配置
# 启动时使用: --spring.profiles.active=dev

spring:
  datasource:
    url: jdbc:h2:mem:alertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 开发环境禁用安全检查
alert:
  security:
    enabled: false
    api-key: dev-api-key-12345
  feishu:
    enabled: false

logging:
  level:
    com.alert.platform: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoint:
    health:
      show-details: always
