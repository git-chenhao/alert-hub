spring:
  application:
    name: alert-hub

  # 数据源配置
  datasource:
    url: jdbc:h2:mem:alertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2控制台 (仅开发环境启用)
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

# 服务器配置
server:
  port: 8080

# 告警聚合配置
alert:
  # 去重配置
  deduplication:
    enabled: true
    # 去重窗口时间 (分钟)
    window-minutes: 10

  # 聚合配置
  aggregation:
    # 分组等待时间 (秒)
    group-wait-seconds: 30
    # 最大聚合数量
    max-count: 50
    # 最大等待时间 (秒)
    max-wait-seconds: 300
    # 分组标签 (逗号分隔)
    group-by-labels: "severity,alertname"

  # Sub-Agent配置 (A2A协议)
  agent:
    # Sub-Agent端点
    endpoint: http://localhost:9001/api/agent/analyze
    # 请求超时 (秒)
    timeout-seconds: 60
    # 最大重试次数
    max-retries: 3

  # 飞书通知配置
  feishu:
    enabled: true
    webhook-url: ${FEISHU_WEBHOOK:}
    # 是否发送详细分析结果
    send-detail: true

# 日志配置
logging:
  level:
    com.alert.platform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# JWT配置
jwt:
  # JWT密钥 (生产环境必须使用环境变量)
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long-for-hs256}
  # Token过期时间 (毫秒) - 默认24小时
  expiration: ${JWT_EXPIRATION:86400000}
