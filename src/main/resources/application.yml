spring:
  application:
    name: alert-hub

  # 数据源配置 - 使用环境变量
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:alertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  # H2控制台 - 仅开发环境启用
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

# 服务器配置
server:
  port: ${SERVER_PORT:8080}

# 告警聚合配置
alert:
  # 安全配置
  security:
    enabled: ${SECURITY_ENABLED:true}
    # API Key用于认证，生产环境必须通过环境变量设置
    api-key: ${ALERT_API_KEY:}

  # 去重配置
  deduplication:
    enabled: true
    window-minutes: 10

  # 聚合配置
  aggregation:
    group-wait-seconds: 30
    max-count: 50
    max-wait-seconds: 300
    group-by-labels: "severity,alertname"

  # Sub-Agent配置 (A2A协议)
  agent:
    endpoint: ${AGENT_ENDPOINT:http://localhost:9001/api/agent/analyze}
    timeout-seconds: 60
    max-retries: 3

  # 飞书通知配置 - 使用环境变量
  feishu:
    enabled: ${FEISHU_ENABLED:false}
    webhook-url: ${FEISHU_WEBHOOK_URL:}
    send-detail: true

# 日志配置
logging:
  level:
    com.alert.platform: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 管理端点配置 - 限制暴露的端点
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # 生产环境不显示详细信息
      show-details: ${HEALTH_SHOW_DETAILS:never}
  # 安全配置 - 仅允许内部访问
  server:
    port: ${MANAGEMENT_PORT:8081}
